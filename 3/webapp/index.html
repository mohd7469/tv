<!DOCTYPE html>
<html>

<head>
	<title>Tradingview</title>
	<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0" />

	<script type="text/javascript"
		src="https://cdn.jsdelivr.net/gh/mohd7469/tv@main/3/webapp/charting_library/charting_library.standalone.js"></script>
	<script type="text/javascript"
		src="https://cdn.jsdelivr.net/gh/mohd7469/tv@main/3/webapp/charting_library/external-embedding/embed-widget-tradingview-datafeed.js"></script>
	<script type="text/javascript"
		src="https://cdn.jsdelivr.net/gh/mohd7469/tv@main/3/webapp/charting_library/broker-sample/dist/bundle.js"></script>

	<script type="module">
		// @ts-nocheck

		// Default Enabled Watchlist Volumn Column 
		localStorage.setItem('widget.watchlist.view-state', JSON.stringify(["short_name", "last_price", "change", "change_percent", "volume"]));

		// Chart Display Types 
		const chartDisplayTypes = {
			'bars': 0,
			'candles': 1,
			'line': 2,
			'area': 3,
			'renko': 4,
			'heikin_ashi': 8,
			'hollow_candles': 9,
			'baseline': 10,
			'hi_lo': 12,
			'column': 13,
			'volume_candles': 19,
		};

		// Global Chart Settings 
		const config = {
			candleRange: 5,
			symbols: [
				{
					symbol: 'BINANCE:BTCUSDT.P',
					chartType: 'candles',
					interval: '1h',
					indicators: [
						{ name: 'Relative Strength Index', inputs: { length: 7 } }
					]
				},
				{
					symbol: 'BINANCE:ETHUSDT.P',
					chartType: 'candles',
					interval: '1h',
					indicators: [
						{ name: 'Relative Strength Index', inputs: { length: 14 } }
					]
				},
				{
					symbol: 'BINANCE:SOLUSDT.P',
					chartType: 'candles',
					interval: '1h',
					indicators: [
						{ name: 'Relative Strength Index', inputs: { length: 21 } }
					]
				},
			],
		}

		// Style Configuration
		const styles = {
			customCSS: `#documentation-toolbar-button {
					all: unset;
					position: relative;
					color: #FFF;
					font-size: 14px;
					font-weight: 400;
					line-height: 18px;
					letter-spacing: 0.15408px;
					padding: 5px 12px;
					border-radius: 80px;
				background: #2962FF;
					cursor: pointer;
				}
			#documentation-toolbar-button:hover { background: #1E53E5; }
			#documentation-toolbar-button:active { background: #1948CC; }
				#theme-toggle { display: flex; flex-direction: row; align-items: center; gap: 12px; }
				.switcher { display: inline-block; position: relative; width: 38px; height: 20px; vertical-align: middle; }
				.switcher input { position: absolute; opacity: 0; width: 100%; height: 100%; z-index: 1; cursor: pointer; }
				.switcher .thumb-wrapper { display: block; border-radius: 20px; position: relative; height: 100%; width: 100%; }
				.switcher .track { position: absolute; left: 0; top: 0; width: 100%; height: 100%; border-radius: 20px; background-color: #a3a6af; }
			#theme-switch:checked + .thumb-wrapper .track { background-color: #2962ff; }
				.switcher .thumb { display: block; width: 14px; height: 14px; border-radius: 14px; background: #fff; transition: transform 250ms ease-out; transform: translate(3px, 3px); }
				.switcher input:checked + .thumb-wrapper .thumb { transform: translate(21px, 3px); }
				#tv_chart_container { height: 100%; width: 100%; }`
		};

		// Chart SVG
		const codeSvg = (style) => `<svg style="${style}" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.93556 4.5061L3.43556 8.5061L3.00342 8.99998L3.43556 9.49386L6.93556 13.4939L8.06443 12.5061L4.99657 8.99998L8.06443 5.49386L6.93556 4.5061ZM11.0644 13.4939L14.5644 9.49386L14.9966 8.99998L14.5644 8.5061L11.0644 4.5061L9.93556 5.49386L13.0034 8.99998L9.93556 12.5061L11.0644 13.4939Z" fill="currentColor"/></svg>`;

		// UTILITY FUNCTIONS

		function getParameterByName(name) {
			name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
			const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
			const results = regex.exec(location.search);
			return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
		}

		function formatVolume(vol) {
			if (vol === undefined || vol === null || isNaN(vol)) return '-';
			const v = parseFloat(vol);
			if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
			if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
			if (v >= 1e3) return (v / 1e3).toFixed(2) + 'K';
			return v.toFixed(0);
		}

		async function fetchNews() {
			try {
				const response = await fetch('https://demo-feed-data.tradingview.com/tv_news');
				const xml = await response.text();
				const parser = new DOMParser();
				const dom = parser.parseFromString(xml, 'application/xml');
				const items = dom.querySelectorAll('item');

				return Array.from(items).map(item => {
					const contentNode = Array.from(item.childNodes).find(el => el.tagName === 'content:encoded');
					let decodedContent = '';
					if (contentNode) {
						const temp = document.createElement("div");
						temp.innerHTML = contentNode.textContent ?? '';
						decodedContent = temp.innerText;
					}
					return {
						link: item.querySelector('link').textContent,
						published: new Date(item.querySelector('pubDate').textContent).valueOf(),
						shortDescription: decodedContent ? (decodedContent.slice(0, 150) + '...') : '',
						provider: { id: 'tradingview', name: 'TradingView' },
						title: item.querySelector('title').textContent,
					};
				});
			} catch (e) {
				console.error("News Fetch Error:", e);
				return [];
			}
		}

		// MAIN APP INITIALIZATION

		export async function initOnReady() {
			const waitForTradingView = () => {
				return new Promise((resolve) => {
					const check = () =>
						window.TradingView?.TradingViewDatafeed
							? resolve()
							: setTimeout(check, 100);

					check();
				});
			};

			await waitForTradingView();

			class CustomDatafeed extends TradingView.TradingViewDatafeed {
				constructor() {
					super();
					this._historyCache = new Map();
					this.MAX_CACHE_SIZE = 2000; // Global limit for memory management
				}

				_mergeBars(existing, incoming) {
					const map = new Map();

					// Existing aur incoming bars ko map mein daalein (duplicates auto-handle ho jayenge)
					existing.forEach(b => map.set(b.time, b));
					incoming.forEach(b => map.set(b.time, b));

					// Sort by time
					let sortedBars = Array.from(map.values()).sort((a, b) => a.time - b.time);

					// Memory Management: Sirf aakhri MAX_CACHE_SIZE bars rakhein
					if (sortedBars.length > this.MAX_CACHE_SIZE) {
						sortedBars = sortedBars.slice(-this.MAX_CACHE_SIZE);
						console.log("Memory Cleaned: Only keeping last 2000 bars.");
					}

					return sortedBars;
				}

				_getChartData(chart, upto) {
					return new Promise((resolve) => {
						chart.exportData({
							includeTime: false, // Time nai chahiye
							includeSeries: false, // OHLC nai chahiye
							includeStudies: true // Sirf indicators chahiye
						}).then(result => {
							const { data, schema } = result;

							// Sirf aakhri 'upto' bars ka data slice karo
							const startIdx = Math.max(0, data.length - upto);
							const slicedData = data.slice(startIdx);

							// Seedha map return karo, extra variables ki zaroorat nahi
							const finalResults = slicedData.map(row => {
								const indicators = {};
								schema.forEach((s, i) => {
									if (s.sourceType === 'study') {
										// row[i] mein indicator ki value hai
										indicators[s.sourceTitle] = row[i];
									}
								});
								return { indicators };
							});

							resolve(finalResults);
						}).catch(err => {
							console.error("Error in getChartData:", err);
							resolve([]);
						});
					});
				}

				getBars(symbolInfo, resolution, periodParams, onResult, onError) {
					super.getBars(symbolInfo, resolution, periodParams, (bars, meta) => {
						if (bars && bars.length > 0) {
							const currentSymbol = symbolInfo.ticker;

							// Existing data fetch karein aur merge karein
							const existingBars = this._historyCache.get(currentSymbol) || [];
							const mergedBars = this._mergeBars(existingBars, bars);

							// Cache update karein
							this._historyCache.set(currentSymbol, mergedBars);

							// console.log(`Cache updated for ${currentSymbol}. Total bars: ${mergedBars.length}`);

							onResult(bars, meta);
						} else {
							onResult(bars, meta);
						}
					}, onError);
				}

				subscribeBars(symbolInfo, resolution, onTick, listenerGuid, onResetCacheNeededCallback) {
					const currentSymbol = symbolInfo.ticker;
					const currentInterval = resolution;

					const onCallback = (bar) => {
						// TradingView ko update bhejein
						onTick(bar);

						let history = this._historyCache.get(currentSymbol) || [];

						if (history.length > 0) {
							const lastBar = history[history.length - 1];

							if (bar.time > lastBar.time) {
								// 1. Nayi candle start hui hai
								history.push(bar);

								// Memory check for real-time
								if (history.length > this.MAX_CACHE_SIZE) {
									history.shift();
								}
							} else {
								// 2. Maujooda candle update ho rahi hai (last bar update)
								history[history.length - 1] = bar;
							}
						} else {
							history.push(bar);
						}

						// Cache mein update save karein
						this._historyCache.set(currentSymbol, history);

						// --- Real-time Indicators Sync ---
						if (window.tvWidget) {
							const range = config.candleRange;
							const chartIndex = config.symbols.findIndex(s => s.symbol === currentSymbol);

							if (chartIndex !== -1) {
								const chart = window.tvWidget.chart(chartIndex);

								this._getChartData(chart, range).then(indicatorResults => {
									const historySlice = history.slice(-range);

									// Index-based matching: sync history and indicator arrays
									const mergedData = historySlice.map((hBar, index) => {
										const iData = indicatorResults[index];
										return {
											...hBar,
											indicators: (iData && iData.indicators) ? iData.indicators : {}
										};
									});

									const payload = {
										symbol: currentSymbol,
										interval: currentInterval,
										data: mergedData
									};

									// Chart switch logic
									window.tvWidget.setActiveChart(chartIndex);

									console.log("Payload:", payload);

									// Global Event Dispatch
									window.dispatchEvent(new CustomEvent('candleUpdates', {
										detail: JSON.stringify(payload)
									}));
								});
							}
						}
					};

					super.subscribeBars(symbolInfo, resolution, onCallback, listenerGuid, onResetCacheNeededCallback);
				}
			}

			const datafeed = new CustomDatafeed();

			// Setup CSS
			const cssBlob = new Blob([styles.customCSS], { type: "text/css" });
			const cssBlobUrl = URL.createObjectURL(cssBlob);

			const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
			const theme = getParameterByName('theme') || (isDark ? 'dark' : 'light');

			// Initialize Widget
			const defaultSymbol = config.symbols[0];
			const widget = window.tvWidget = new TradingView.widget({
				fullscreen: true,
				autosize: true,
				symbol: defaultSymbol.symbol,
				interval: defaultSymbol.interval,
				container: 'tv_chart_container',
				datafeed: datafeed,
				library_path: 'https://cdn.jsdelivr.net/gh/mohd7469/tv@main/3/webapp/charting_library/',
				locale: getParameterByName('lang') || 'en',
				custom_css_url: cssBlobUrl,
				theme: theme,
				disabled_features: [
					'use_localstorage_for_settings',
					'open_account_manager',
					'dom_widget',
				],
				enabled_features: [
					'study_templates',
					'pre_post_market_sessions',
					'show_symbol_logos',
					'show_exchange_logos',
					'seconds_resolution',
					// 'custom_resolutions', // datafeed doesn't support this
					'secondary_series_extend_time_scale',
					// 'determine_first_data_request_size_using_visible_range',
					'show_percent_option_for_right_margin',
					'display_data_mode',
					'items_favoriting',
					'disable_resolution_rebuild',
					'pre_post_market_price_line'
				],
				overrides: {
					// "mainSeriesProperties.style": 1,
					"mainSeriesProperties.showCountdown": true,
					// 'mainSeriesProperties.sessionId': 'extended',
				},
				charts_storage_url: 'https://saveload.tradingview.com',
				charts_storage_api_version: '1.1',
				client_id: 'trading_platform_demo',
				user_id: 'public_user',
				widgetbar: {
					details: true,
					news: true,
					watchlist: true,
					datawindow: true,
					watchlist_settings: {
						default_symbols: config.symbols.map(s => s.symbol),
					},
				},
				news_provider: async (symbol, callback) => {
					// const newsItems = await fetchNews();
					callback({ title: 'Market Insights', newsItems: [] });
				},
				broker_factory: (host) => new Brokers.BrokerDemo(host, datafeed),
				broker_config: {
					configFlags: {
						supportNativeReversePosition: true,
						supportClosePosition: true,
						supportPLUpdate: true,
						supportLevel2Data: false,
						showQuantityInsteadOfAmount: true,
						supportEditAmount: false,
						supportOrderBrackets: true,
						supportMarketBrackets: true,
						supportPositionBrackets: true,
						supportOrdersHistory: false,
						supportMultipleExitLevels: true
					},
					durations: [
						{ name: 'DAY', value: 'DAY' },
						{ name: 'GTC', value: 'GTC' },
					],
				},
			});

			// Datafeed Status UI
			datafeed.onSymbolChange = (symbol) => {
				widget
					.customSymbolStatus()
					.symbol(symbol)
					.setColor('#00BCD4')
					.setVisible(true)
					.setIcon(codeSvg(''))
					.setTooltip('Connected')
					.setDropDownContent([{
						title: 'Demo Datafeed',
						icon: codeSvg('background-color: rgba(0, 188, 212, 0.1); border-radius: 100%'),
						content: ['Real-time data streaming active.']
					}]);
			};

			// Header Buttons
			widget.headerReady().then(() => {
				// Theme Toggle
				const themeBtn = widget.createButton({ align: 'right' });
				themeBtn.innerHTML = `<label style="cursor:pointer; display:flex; align-items:center; gap:8px;">
					Dark Mode <div class="switcher">
						<input type="checkbox" id="theme-switch" ${theme === 'dark' ? 'checked' : ''}>
						<span class="thumb-wrapper"><span class="track"></span><span class="thumb"></span></span>
					</div></label>`;
				themeBtn.querySelector('#theme-switch').addEventListener('change', (e) => {
					widget.changeTheme(e.target.checked ? 'dark' : 'light', { disableUndo: true });
				});

			});

			widget.onChartReady(async () => {
				widget.setLayout(config.symbols.length + 'h');

				for (let i = 0; i < config.symbols.length; i++) {
					try {
						await new Promise(resolve => setTimeout(resolve, 1000));
						const chart = widget.chart(i);

						if (chart) {
							const { symbol, interval, chartType } = config.symbols[i];
							chart.setSymbol(symbol, () => {
								chart.setResolution(interval);
							});
							chart.setChartType(chartDisplayTypes[chartType]);
						}
					} catch (err) {
						console.error(`Error setting layout ${i}:`, err);
					}
				}

				for (let i = 0; i < config.symbols.length; i++) {
					try {
						await new Promise(resolve => setTimeout(resolve, 1000));
						const chart = widget.chart(i);

						if (chart) {
							const { indicators } = config.symbols[i];
							if (indicators) {
								indicators.forEach(ind => {
									const inputs = ind.inputs || [];
									chart.createStudy(
										ind.name,
										false,    // forceOverlay
										false,    // lock
										inputs
									);
								});
							}
						}
					} catch (err) {
						console.error(`Error setting indicators ${i}:`, err);
					}
				}
			});
		}

		window.addEventListener('DOMContentLoaded', initOnReady, false);
	</script>
