<head>
	<title>Tradingview</title>

	<script type="text/javascript">
		// @ts-nocheck

		// Default Enabled Watchlist Volumn Column 
		localStorage.setItem('widget.watchlist.view-state', JSON.stringify(["short_name", "last_price", "change", "change_percent", "volume"]));

		// Chart Display Types 
		const chartDisplayTypes = {
			'bars': 0,
			'candles': 1,
			'line': 2,
			'area': 3,
			'heikin_ashi': 8,
			'hollow_candles': 9,
			'baseline': 10,
			'hi_lo': 12,
			'column': 13,
			'volume_candles': 19,
		};

		// Global Chart Settings 
		const config = {
			symbol: "BINANCE:BTCUSDT.P",
			chartType: "candles",
			timeframe: "1",
			candleRange: 5,
			watchList: [
				"BINANCE:BTCUSDT.P",
				"BYBIT:ETHUSDT.P",
				"OKX:SOLUSDT.P"
			],
			indicators: [
				"Volume",
				"Relative Strength Index"
			]
		}

		// Style Configuration
		const styles = {
			customCSS: `#documentation-toolbar-button {
					all: unset;
					position: relative;
					color: #FFF;
					font-size: 14px;
					font-weight: 400;
					line-height: 18px;
					letter-spacing: 0.15408px;
					padding: 5px 12px;
					border-radius: 80px;
				background: #2962FF;
					cursor: pointer;
				}
			#documentation-toolbar-button:hover { background: #1E53E5; }
			#documentation-toolbar-button:active { background: #1948CC; }
				#theme-toggle { display: flex; flex-direction: row; align-items: center; gap: 12px; }
				.switcher { display: inline-block; position: relative; width: 38px; height: 20px; vertical-align: middle; }
				.switcher input { position: absolute; opacity: 0; width: 100%; height: 100%; z-index: 1; cursor: pointer; }
				.switcher .thumb-wrapper { display: block; border-radius: 20px; position: relative; height: 100%; width: 100%; }
				.switcher .track { position: absolute; left: 0; top: 0; width: 100%; height: 100%; border-radius: 20px; background-color: #a3a6af; }
			#theme-switch:checked + .thumb-wrapper .track { background-color: #2962ff; }
				.switcher .thumb { display: block; width: 14px; height: 14px; border-radius: 14px; background: #fff; transition: transform 250ms ease-out; transform: translate(3px, 3px); }
				.switcher input:checked + .thumb-wrapper .thumb { transform: translate(21px, 3px); }
				#tv_chart_container { height: 100%; width: 100%; }`
		};

		// Chart SVG
		const codeSvg = (style) => `<svg style="${style}" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M6.93556 4.5061L3.43556 8.5061L3.00342 8.99998L3.43556 9.49386L6.93556 13.4939L8.06443 12.5061L4.99657 8.99998L8.06443 5.49386L6.93556 4.5061ZM11.0644 13.4939L14.5644 9.49386L14.9966 8.99998L14.5644 8.5061L11.0644 4.5061L9.93556 5.49386L13.0034 8.99998L9.93556 12.5061L11.0644 13.4939Z" fill="currentColor"/></svg>`;

		// UTILITY FUNCTIONS

		function getParameterByName(name) {
			name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
			const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
			const results = regex.exec(location.search);
			return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
		}

		function formatVolume(vol) {
			if (vol === undefined || vol === null || isNaN(vol)) return '-';
			const v = parseFloat(vol);
			if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
			if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
			if (v >= 1e3) return (v / 1e3).toFixed(2) + 'K';
			return v.toFixed(0);
		}

		async function fetchNews() {
			try {
				const response = await fetch('https://demo-feed-data.tradingview.com/tv_news');
				const xml = await response.text();
				const parser = new DOMParser();
				const dom = parser.parseFromString(xml, 'application/xml');
				const items = dom.querySelectorAll('item');

				return Array.from(items).map(item => {
					const contentNode = Array.from(item.childNodes).find(el => el.tagName === 'content:encoded');
					let decodedContent = '';
					if (contentNode) {
						const temp = document.createElement("div");
						temp.innerHTML = contentNode.textContent ?? '';
						decodedContent = temp.innerText;
					}
					return {
						link: item.querySelector('link').textContent,
						published: new Date(item.querySelector('pubDate').textContent).valueOf(),
						shortDescription: decodedContent ? (decodedContent.slice(0, 150) + '...') : '',
						provider: { id: 'tradingview', name: 'TradingView' },
						title: item.querySelector('title').textContent,
					};
				});
			} catch (e) {
				console.error("News Fetch Error:", e);
				return [];
			}
		}

		// INDICATOR UTILITIES

		async function syncIndicators(chart, desiredIndicators) {
			return new Promise((resolve) => {
				// const currentActiveIndicators = chart.getAllStudies();
				// const activeIndicatorNames = currentActiveIndicators.map(s => s.name);

				// // 1. Remove indicators that are NO LONGER in the updated list
				// for (const study of currentActiveIndicators) {
				//     if (!desiredIndicators.includes(study.name)) {
				//         try {
				//             chart.removeEntity(study.id);
				//             console.log(`Indicator removed: ${study.name}`);
				//         } catch (e) {
				//             console.error(`Failed to remove indicator ${study.name}:`, e);
				//         }
				//     }
				// }

				// // 2. Add indicators that are NEW
				// for (const name of desiredIndicators) {
				//     if (!activeIndicatorNames.includes(name)) {
				//         try {
				//             chart.createStudy(name, false, false);
				//             console.log(`Indicator added: ${name}`);
				//         } catch (e) {
				//             console.error(`Failed to add indicator ${name}:`, e);
				//         }
				//     }
				// }

				const currentActiveIndicators = chart.getAllStudies();

				// e.g. our desired indicator "Volume" becomes "Volume - BTC" on chart.
				// So we use a prefix-based match (case-insensitive) instead of exact match.
				const isMatch = (activeName, desiredName) =>
					activeName.toLowerCase().startsWith(desiredName.toLowerCase());
				const isDesired = (activeName) =>
					desiredIndicators.some(d => isMatch(activeName, d));
				const isAlreadyActive = (desiredName) =>
					currentActiveIndicators.some(s => isMatch(s.name, desiredName));

				// 1. Remove indicators that are NO LONGER in the desired list
				for (const study of currentActiveIndicators) {
					if (!isDesired(study.name)) {
						try {
							chart.removeEntity(study.id);
							console.log(`Indicator removed: ${study.name}`);
						} catch (e) {
							console.error(`Failed to remove indicator ${study.name}:`, e);
						}
					}
				}

				// 2. Add indicators that are NEW (not already on the chart)
				for (const name of desiredIndicators) {
					if (!isAlreadyActive(name)) {
						try {
							chart.createStudy(name, false, false);
							console.log(`Indicator added: ${name}`);
						} catch (e) {
							console.error(`Failed to add indicator ${name}:`, e);
						}
					}
				}

				resolve();
			}).catch(err => {
				console.error("Error in syncIndicators:", err);
				resolve([]);
			});
		}

		async function getChartData(chart, upto) {
			return new Promise((resolve) => {
				const currentActiveIndicators = chart.getAllStudies();
				// const activeIndicatorNames = currentActiveIndicators.map(s => s.name);

				chart.exportData({
					includeTime: true,
					includeSeries: true,
					includeStudies: true
				}).then(result => {
					// console.log(result);

					const { data, schema } = result;

					const finalResults = [];

					// start index from where we need to fetch data
					const startIdx = Math.max(0, data.length - upto);

					data.slice(startIdx).map((float64ArrayRow, dataIndex) => {
						const formattedData = {};
						// create empty indicators object for setting applied indicator values for each candle 
						formattedData['indicators'] = {};

						schema.forEach((schemaObj, schemaIndex) => {
							const { type, sourceType } = schemaObj;

							if (type === 'time') {
								formattedData['time'] = float64ArrayRow[schemaIndex];
								return;
							} else if (type === 'value') {
								switch (sourceType) {
									case 'series':
										const { plotTitle } = schemaObj;
										const key = plotTitle.toLowerCase();
										if (['open', 'high', 'low', 'close'].includes(key)) {
											formattedData[key] = float64ArrayRow[schemaIndex];
										}
										break;
									case 'study':
										const { sourceId, sourceTitle } = schemaObj; // this is indicator id
										const indicator = currentActiveIndicators.find(obj => obj.id === sourceId);
										formattedData['indicators'][sourceTitle] = float64ArrayRow[schemaIndex];
										break;
								}
							}
						})

						finalResults.push(formattedData);
					})

					resolve(finalResults.reverse());
				})

			}).catch(err => {
				console.error("Error in getChartData:", err);
				resolve([]);
			});
		}

		// MAIN APP INITIALIZATION

		export async function initOnReady() {
			const waitForTradingView = () => {
				return new Promise((resolve) => {
					const check = () =>
						window.TradingView?.TradingViewDatafeed
							? resolve()
							: setTimeout(check, 100);

					check();
				});
			};

			await waitForTradingView();

			class CustomDatafeed extends TradingView.TradingViewDatafeed {
				constructor() {
					super();
					this.onSymbolChange = null;
				}

				resolveSymbol(symbolName, onSymbolResolvedCallback, onResolveErrorCallback, extension) {
					if (this.onSymbolChange) this.onSymbolChange(symbolName);
					super.resolveSymbol(symbolName, onSymbolResolvedCallback, onResolveErrorCallback, extension);
				}

				getBars(symbolInfo, resolution, periodParams, onResult, onError) {
					super.getBars(symbolInfo, resolution, periodParams, (bars, meta) => {
						if (bars && bars.length > 0) {
							onResult(bars, meta);
						}
					}, onError);
				}

				subscribeBars(symbolInfo, resolution, onTick, listenerGuid, onResetCacheNeededCallback) {
					const onCallback = async (bar) => {
						onTick(bar);
					};
					super.subscribeBars(symbolInfo, resolution, onCallback, listenerGuid, onResetCacheNeededCallback);
				}
			}

			const datafeed = new CustomDatafeed();

			// Setup CSS
			const cssBlob = new Blob([styles.customCSS], { type: "text/css" });
			const cssBlobUrl = URL.createObjectURL(cssBlob);

			const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
			const theme = getParameterByName('theme') || (isDark ? 'dark' : 'light');

			// Initialize Widget
			const widget = window.tvWidget = new TradingView.widget({
				fullscreen: false,
				autosize: true,
				symbol: config.symbol,
				interval: config.timeframe,
				container: 'tv_chart_container',
				datafeed: datafeed,
				library_path: 'charting_library/',
				locale: getParameterByName('lang') || 'en',
				custom_css_url: cssBlobUrl,
				theme: theme,
				disabled_features: [
					'use_localstorage_for_settings',
					'open_account_manager',
					'dom_widget',
				],
				enabled_features: [
					'study_templates',
					'pre_post_market_sessions',
					'show_symbol_logos',
					'show_exchange_logos',
					'seconds_resolution',
					// 'custom_resolutions', // datafeed doesn't support this
					'secondary_series_extend_time_scale',
					// 'determine_first_data_request_size_using_visible_range',
					'show_percent_option_for_right_margin',
					'display_data_mode',
					'items_favoriting',
					'disable_resolution_rebuild',
					'pre_post_market_price_line'
				],
				overrides: {
					"mainSeriesProperties.style": chartDisplayTypes[config.chartType] ?? 1,
					"mainSeriesProperties.showCountdown": true,
					// 'mainSeriesProperties.sessionId': 'extended',
				},
				charts_storage_url: 'https://saveload.tradingview.com',
				charts_storage_api_version: '1.1',
				client_id: 'trading_platform_demo',
				user_id: 'public_user',
				widgetbar: {
					details: true,
					news: true,
					watchlist: true,
					datawindow: true,
					watchlist_settings: {
						default_symbols: config.watchList,
					},
				},
				news_provider: async (symbol, callback) => {
					// const newsItems = await fetchNews();
					callback({ title: 'Market Insights', newsItems: [] });
				},
				broker_factory: (host) => new Brokers.BrokerDemo(host, datafeed),
				broker_config: {
					configFlags: {
						supportNativeReversePosition: true,
						supportClosePosition: true,
						supportPLUpdate: true,
						supportLevel2Data: false,
						showQuantityInsteadOfAmount: true,
						supportEditAmount: false,
						supportOrderBrackets: true,
						supportMarketBrackets: true,
						supportPositionBrackets: true,
						supportOrdersHistory: false,
						supportMultipleExitLevels: true
					},
					durations: [
						{ name: 'DAY', value: 'DAY' },
						{ name: 'GTC', value: 'GTC' },
					],
				},
			});

			// Datafeed Status UI
			datafeed.onSymbolChange = (symbol) => {
				widget
					.customSymbolStatus()
					.symbol(symbol)
					.setColor('#00BCD4')
					.setVisible(true)
					.setIcon(codeSvg(''))
					.setTooltip('Connected')
					.setDropDownContent([{
						title: 'Demo Datafeed',
						icon: codeSvg('background-color: rgba(0, 188, 212, 0.1); border-radius: 100%'),
						content: ['Real-time data streaming active.']
					}]);
			};

			// Header Buttons
			widget.headerReady().then(() => {
				// Theme Toggle
				const themeBtn = widget.createButton({ align: 'right' });
				themeBtn.innerHTML = `<label style="cursor:pointer; display:flex; align-items:center; gap:8px;">
					Dark Mode <div class="switcher">
						<input type="checkbox" id="theme-switch" ${theme === 'dark' ? 'checked' : ''}>
						<span class="thumb-wrapper"><span class="track"></span><span class="thumb"></span></span>
					</div></label>`;
				themeBtn.querySelector('#theme-switch').addEventListener('change', (e) => {
					widget.changeTheme(e.target.checked ? 'dark' : 'light', { disableUndo: true });
				});

			});

			// Watchlist Data Stream
			widget.onChartReady(async () => {
				const chart = widget.activeChart();

				// Initial Indicator Sync
				if (config.indicators) {
					await syncIndicators(chart, config.indicators);
				}

				widget.subscribe('onTick', async () => {
					try {
						// extract candle data (upto X candles)
						const res = await getChartData(chart, config.candleRange);

						const payload = {
							symbol: chart.symbol(),
							currentTimeframe: chart.resolution(),
							data: res
						}

						// console.log('dispatching candleUpdates', payload);
						window.dispatchEvent(new CustomEvent('candleUpdates', { detail: JSON.stringify(payload) }));
					} catch (error) {
						console.error("Tick processing error:", error);
					}
				});

				// Current symbols ko track karne ke liye variable
				let currentSymbols = [];
				const watchlistListenerId = "global_watchlist_id";
				const watchlistApi = await widget.watchList();

				const syncWatchlist = async () => {
					try {
						const rawLists = watchlistApi.getAllLists();
						if (!rawLists) return;

						// All symbols extract karna
						const listIds = Object.keys(rawLists);
						const allSymbols = listIds.flatMap(id => {
							const listData = watchlistApi.getList(id);
							return listData ? listData : [];
						});

						// Unique aur valid symbols filter karna
						const watchListSymbols = [...new Set(allSymbols.filter(item => !item.startsWith('###')))];

						// Check agar list waqayi change hui hai
						if (JSON.stringify(watchListSymbols) !== JSON.stringify(currentSymbols)) {

							// --- UNSUBSCRIBE LOGIC ---
							// Nayi subscription se pehle purani ID ko unsubscribe karein
							if (typeof datafeed.unsubscribeQuotes === 'function') {
								datafeed.unsubscribeQuotes(watchlistListenerId);
								console.log("Unsubscribed previous watchlist symbols");
							}

							// Reference update karein
							currentSymbols = watchListSymbols;

							if (currentSymbols.length === 0) {
								console.log("Watchlist is empty, skipping subscription.");
								return;
							}

							// --- SUBSCRIBE LOGIC ---
							console.log("Subscribing to new symbols:", currentSymbols);
							datafeed.subscribeQuotes(
								currentSymbols,
								[config.symbol], // fastSymbols
								(data) => {
									data?.forEach(quote => {
										if (quote.s === 'ok' && quote.v.trade_loaded) {
											// Window variable for real-time data publication
											if (typeof window !== 'undefined') {
												const payload = {
													symbols: currentSymbols,
													currentTimeframe: chart.resolution(),
													data: {
														symbol: quote.v.original_name,
														lastPrice: parseFloat(quote.v.lp),
														changeUsd: parseFloat(quote.v.ch),
														changePercent: parseFloat(quote.v.chp),
														volume: formatVolume(quote.v.volume)
													}
												};
												// console.log('dispatching watchlistUpdates', payload);
												window.dispatchEvent(new CustomEvent('watchlistUpdates', { detail: JSON.stringify(payload) }));
											}
										}
									});
								},
								watchlistListenerId // Same ID use karein cleanup ke liye
							);
						}
					} catch (error) {
						console.error("Error syncing watchlist:", error);
					}
				};

				// Initial Watchlist Sync
				syncWatchlist();

				// Dynamic Events Listeners
				const events = ['onListAdded', 'onListChanged', 'onListRemoved', 'onListRenamed'];
				events.forEach(eventName => {
					if (typeof watchlistApi[eventName] === 'function') {
						watchlistApi[eventName]().subscribe(null, () => {
							// console.log(`Event Triggered: ${eventName}`);
							syncWatchlist();
						});
					}
				});

			});

			window.frames[0]?.focus();
		}

		window.addEventListener('DOMContentLoaded', initOnReady, false);
	</script>
