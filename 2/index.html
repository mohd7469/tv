<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>TradingView Binance Futures</title>
    <script src="./charting_library/charting_library.standalone.js"></script>
</head>

<body style="margin:0">
    <div id="tv_chart_container"></div>

    <script>
        const intervalMap = {
            '1': '1m',
            '3': '3m',
            '5': '5m',
            '15': '15m',
            '30': '30m',
            '60': '1h',
            '120': '2h',
            '240': '4h',
            '480': '8h',
            '1D': '1d'
        };

        const timeframes = Object.keys(intervalMap);
        let socket = null;

        // 1. Time Offset calculate karein (System vs Binance)
        let binanceTimeOffset = 0;
        fetch('https://fapi.binance.com/fapi/v1/time')
            .then(res => res.json())
            .then(data => {
                binanceTimeOffset = data.serverTime - Date.now();
            });

        const config = {
            symbol: "BTCUSDT.P",
            interval: "1",
            exchange: "Binance"
        };

        const binanceDatafeed = {
            onReady: (cb) => {
                setTimeout(() => cb({
                    supported_resolutions: timeframes,
                    supports_time: true
                }), 0);
            },

            getServerTime: (callback) => {
                callback(Math.floor((Date.now() + binanceTimeOffset) / 1000));
            },

            resolveSymbol: (symbolName, onResolve) => {
                onResolve({
                    name: symbolName,
                    ticker: symbolName,
                    type: "crypto",
                    session: "24x7",
                    timezone: "Etc/UTC",
                    minmov: 1,
                    pricescale: 100,
                    has_intraday: true,
                    supported_resolutions: timeframes,
                    data_status: "streaming",
                    exchange: config.exchange,
                    listed_exchange: config.exchange,
                });
            },

            getBars: async (symbolInfo, resolution, periodParams, onHistory) => {
                const { from, to } = periodParams;
                const interval = intervalMap[resolution] || '1m';
                const cleanSymbol = symbolInfo.name.replace('.P', '').toUpperCase();
                const url = `https://fapi.binance.com/fapi/v1/klines?symbol=${cleanSymbol}&interval=${interval}&startTime=${from * 1000}&endTime=${to * 1000}&limit=1000`;

                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    const bars = data.map(d => ({
                        time: d[0],
                        open: parseFloat(d[1]),
                        high: parseFloat(d[2]),
                        low: parseFloat(d[3]),
                        close: parseFloat(d[4]),
                        volume: parseFloat(d[5])
                    }));
                    onHistory(bars, { noData: bars.length === 0 });
                } catch (e) { onHistory([], { noData: true }); }
            },

            subscribeBars: (symbolInfo, resolution, onRealtimeCallback) => {
                if (socket) socket.close();
                const interval = intervalMap[resolution] || '1m';
                const cleanSymbol = symbolInfo.name.replace('.P', '').toLowerCase();
                socket = new WebSocket(`wss://fstream.binance.com/ws/${cleanSymbol}@kline_${interval}`);

                socket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    const k = data.k;
                    onRealtimeCallback({
                        time: k.t,
                        open: parseFloat(k.o),
                        high: parseFloat(k.h),
                        low: parseFloat(k.l),
                        close: parseFloat(k.c),
                        volume: parseFloat(k.v)
                    });
                };
            }
        };

        const localStorageAdapter = {
            // Sabhi saved charts ko load karne ke liye
            getAllCharts: function () {
                return Promise.resolve(JSON.parse(localStorage.getItem('tv_charts') || '[]'));
            },

            // Chart (Drawings ke saath) save karne ke liye
            saveChart: function (chartData) {
                let charts = JSON.parse(localStorage.getItem('tv_charts') || '[]');
                if (!chartData.id) {
                    chartData.id = Math.random().toString(36).substring(7);
                    charts.push(chartData);
                } else {
                    const index = charts.findIndex(c => c.id === chartData.id);
                    if (index !== -1) charts[index] = chartData;
                }
                localStorage.setItem('tv_charts', JSON.stringify(charts));
                return Promise.resolve(chartData.id);
            },

            // Specific chart ko kholne ke liye
            getChartContent: function (id) {
                const charts = JSON.parse(localStorage.getItem('tv_charts') || '[]');
                const chart = charts.find(c => c.id === id);
                return Promise.resolve(chart ? chart.content : "");
            },

            // Chart delete karne ke liye
            removeChart: function (id) {
                let charts = JSON.parse(localStorage.getItem('tv_charts') || '[]');
                charts = charts.filter(c => c.id !== id);
                localStorage.setItem('tv_charts', JSON.stringify(charts));
                return Promise.resolve();
            }
        };

        function getCandleColor(bar) {
            if (!bar) return '';
            if (bar.close > bar.open) return 'Green';
            if (bar.close < bar.open) return 'Red';
            return 'Neutral';
        }

        function getChartDataValues(chart, studies, count = 2) {
            return new Promise((resolve) => {
                return chart.exportData({
                    includeStudies: true,
                    includeSeries: true
                }).then(result => {
                    const data = result.data;
                    const schema = result.schema;
                    const dataLen = data.length;
                    const schemaLen = schema.length;

                    // 1. Studies ko Map mein convert karein (Lookup optimization)
                    const studiesMap = new Map();
                    const studyNames = Object.keys(studies);
                    for (let j = 0; j < studyNames.length; j++) {
                        const name = studyNames[j];
                        studiesMap.set(studies[name], name);
                    }

                    const format = (v) => typeof v === 'number' ? Number(v.toFixed(2)) : v;
                    const finalResults = [];

                    // 2. Sirf required rows uthayein
                    const startIdx = Math.max(0, dataLen - count);

                    // Fast Outer Loop (Candles)
                    for (let r = startIdx; r < dataLen; r++) {
                        const row = data[r];
                        const candleData = {};

                        // Fast Inner Loop (Schema/Columns)
                        for (let i = 0; i < schemaLen; i++) {
                            const field = schema[i];
                            const value = row[i];
                            const sType = field.sourceType; // Caching for speed

                            // Direct string comparison (switch se bhi fast)
                            if (sType === 'series') {
                                const pTitle = field.plotTitle;
                                if (pTitle === 'open' || pTitle === 'close' || pTitle === 'high' || pTitle === 'low') {
                                    candleData[pTitle] = format(value);
                                }
                            } else if (sType === 'study') {
                                // Map Lookup (Fastest way to find if ID exists)
                                const studyName = studiesMap.get(field.sourceId);
                                if (studyName) {
                                    const formattedVal = format(value);
                                    if (candleData[studyName] !== undefined) {
                                        if (!Array.isArray(candleData[studyName])) {
                                            candleData[studyName] = [candleData[studyName]];
                                        }
                                        candleData[studyName].push(formattedVal);
                                    } else {
                                        candleData[studyName] = formattedVal;
                                    }
                                }
                            }
                        }

                        // Final Touch
                        if (candleData.open && candleData.close) {
                            candleData.color = getCandleColor(candleData);
                        }
                        finalResults.push(candleData);
                    }

                    resolve(finalResults);
                }).catch(err => {
                    console.error("Critical Error in FastDataFetch:", err);
                    resolve([]);
                });
            });
        }

        function initOnReady() {
            const widget = new TradingView.widget({
                library_path: "./charting_library/",
                fullscreen: true,
                symbol: config.symbol,
                interval: config.interval,
                container: "tv_chart_container",
                datafeed: binanceDatafeed,
                locale: "en",
                // save_load_adapter: localStorageAdapter,
                // client_id: 'my_local_app',
                // user_id: 'user_01',
                disabled_features: [
                    "create_volume_indicator_by_default",
                    // "use_localstorage_for_settings",
                    "symbol_search_hot_key",
                    "header_symbol_search",
                    "header_compare",
                    "legend_inplace_edit",
                    "trading_account_manager",
                    "left_toolbar",
                    "right_toolbar",
                ],
                enabled_features: [
                    "show_symbol_logos",
                    "side_toolbar",
                    "right_toolbar",
                    // "use_localstorage_for_settings_events",
                ],
                overrides: {
                    "mainSeriesProperties.showCountdown": true,
                },
            });
            widget.onChartReady(() => {
                widget.headerReady().then(async () => {
                    const button = widget.createButton({ align: 'right' });
                    button.innerHTML = `
                        <div class="theme-switch-wrapper">
                            <span class="theme-switch-text">Dark Mode</span>
                            <label class="switch">
                                <input type="checkbox" id="theme-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                    `;

                    const toggle = button.querySelector('#theme-toggle');
                    toggle.addEventListener('change', () => {
                        const theme = toggle.checked ? 'Dark' : 'Light';
                        widget.changeTheme(theme);
                    });

                    const chart = widget.chart();

                    const studies = {
                        // "ma": await chart.createStudy('Moving Average', false, false).then(id => id),
                        "volume": await chart.createStudy('Volume', false, false).then(id => id),
                        // "macd": await chart.createStudy('MACD', false, false).then(id => id),
                        "rsi": await chart.createStudy('Relative Strength Index', false, false).then(id => id),
                    };

                    widget.subscribe('onTick', (bar) => {
                        getChartDataValues(chart, studies).then(res => {
                            console.log(res);
                        });

                    });

                });
            });
        }

        window.addEventListener('DOMContentLoaded', initOnReady);
    </script>
</body>

</html>
